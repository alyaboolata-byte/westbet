<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0b1121"/>
<stop offset="100%" stop-color="#162040"/>
</linearGradient>
<linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#ffcc00"/>
<stop offset="100%" stop-color="#1b5acd"/>
</linearGradient>
<radialGradient id="glow" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#ffcc00" stop-opacity="0.2"/>
<stop offset="70%" stop-color="#ffcc00" stop-opacity="0.03"/>
<stop offset="100%" stop-color="#ffcc00" stop-opacity="0"/>
</radialGradient>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
</filter>
</defs>
<rect width="1200" height="630" fill="url(#bg)"/>
<!-- Decorative glows -->
<circle cx="1050" cy="150" r="280" fill="url(#glow)"/>
<circle cx="180" cy="520" r="260" fill="url(#glow)"/>
<!-- Geometric accents -->
<g stroke="#ffcc00" stroke-width="1.5" opacity="0.08" fill="none">
<line x1="0" y1="60" x2="80" y2="0"/>
<line x1="0" y1="100" x2="120" y2="0"/>
<line x1="1120" y1="630" x2="1200" y2="570"/>
<line x1="1080" y1="630" x2="1200" y2="530"/>
</g>
<!-- Dot pattern -->
<g fill="#ffcc00" opacity="0.12">
<circle cx="100" cy="80" r="3"/><circle cx="130" cy="80" r="2.5"/><circle cx="100" cy="110" r="2.5"/>
<circle cx="1080" cy="100" r="3"/><circle cx="1110" cy="100" r="2.5"/><circle cx="1110" cy="130" r="3"/>
</g>
<!-- Icon badge -->
<g transform="translate(120, 180)" filter="url(#shadow)">
<rect x="0" y="0" width="180" height="180" rx="32" fill="url(#accent)"/>
<g transform="translate(30,30)" color="#0b1121">
<rect x="25" y="40" width="70" height="40" rx="4" fill="none" stroke="currentColor" stroke-width="3"/><path d="M 35 50 L 60 65 L 85 50" fill="none" stroke="currentColor" stroke-width="3"/>
</g>
</g>
<!-- Title -->
<text x="360" y="245" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="72" fill="#ffffff" letter-spacing="-1">Пополнить 1xBet</text>
<text x="360" y="300" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="28" fill="#ffcc00">Все способы ввода денег</text>
<rect x="360" y="330" width="240" height="4" fill="url(#accent)"/>
<!-- CTA block -->
<g transform="translate(360, 400)">
<rect x="0" y="0" width="360" height="72" rx="36" fill="url(#accent)"/>
<text x="180" y="48" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="22" fill="#0b1121" text-anchor="middle" letter-spacing="1">ПОЛУЧИТЬ +500%</text>
</g>
<text x="360" y="520" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="22" fill="#1b5acd">WestBet.ru</text>
<text x="120" y="595" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="14" fill="#ffcc00" opacity="0.45" letter-spacing="4">ЭКСПЕРТНЫЙ ОБЗОР · БОНУСЫ · СТРАТЕГИИ · ОТЗЫВЫ 2026</text>
</svg>